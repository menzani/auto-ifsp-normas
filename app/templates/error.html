{% extends "base.html" %}
{% block title %}Erro {{ status_code }} — IFSP Normas{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 50vh;">
  <div class="br-card" style="max-width: 480px; width: 100%;">
    <div class="card-content p-5 text-center">
      <i class="fas
        {% if status_code == 403 %}fa-lock{% elif status_code == 404 %}fa-search{% else %}fa-exclamation-triangle{% endif %}
        fa-3x mb-3 text-danger" aria-hidden="true"></i>
      <h2 class="text-up-02 text-heavy">Erro {{ status_code }}</h2>
      <p class="mt-2">{{ detail }}</p>
      <a href="/" class="br-button primary mt-4">
        <i class="fas fa-home mr-2" aria-hidden="true"></i>
        Voltar ao início
      </a>
    </div>
  </div>
</div>
{% endblock %}
