# Rate limiting — previne abuso em rotas sensíveis
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=upload_zone:10m rate=1r/m;
limit_req_zone $binary_remote_addr zone=pdf_zone:10m rate=20r/m;
# Ações de revisão (publicar, mover, revogar, excluir) — 20 req/min por IP
limit_req_zone $binary_remote_addr zone=review_action_zone:10m rate=20r/m;
# Polling de status (HTMX a cada 2 s) — 60 req/min por IP (1/s, suporta até 2 abas simultâneas)
limit_req_zone $binary_remote_addr zone=poll_zone:10m rate=60r/m;

server {
    server_name auto.normas.ifsp.edu.br;

    # Oculta versão do nginx em headers e páginas de erro
    server_tokens off;

    # Headers de segurança HTTP
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' unpkg.com cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' cdnjs.cloudflare.com fonts.googleapis.com cdngovbr-ds.estaleiro.serpro.gov.br; img-src 'self' https: data:; font-src 'self' cdnjs.cloudflare.com fonts.gstatic.com cdngovbr-ds.estaleiro.serpro.gov.br; connect-src 'self';" always;

    # Bloqueia métodos HTTP não utilizados
    if ($request_method !~ ^(GET|POST|DELETE|HEAD)$) {
        return 405;
    }

    # Rotas de autenticação — rate limit restritivo
    location /auth/ {
        limit_req zone=auth_zone burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Download de PDFs — rate limit por IP para evitar custo de flood no S3
    # O endpoint gera presigned URL; 4xx do nginx não gera custo no S3
    location /pdf/ {
        limit_req zone=pdf_zone burst=10 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rota de upload — rate limit por hora
    location /upload {
        limit_req zone=upload_zone burst=3 nodelay;
        client_max_body_size 35M;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Polling de status de upload — limita custo de S3 GETs por flood
    location /status/ {
        limit_req zone=poll_zone burst=10 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Polling e cancelamento de revogação
    location /review/revoke-status/ {
        limit_req zone=poll_zone burst=10 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Ações de revisão (publicar, mover, revogar, excluir) — evita disparo em lote
    location /review/ {
        limit_req zone=review_action_zone burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Demais rotas
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/auto.normas.ifsp.edu.br/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/auto.normas.ifsp.edu.br/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = auto.normas.ifsp.edu.br) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name auto.normas.ifsp.edu.br;
    return 404; # managed by Certbot
}
