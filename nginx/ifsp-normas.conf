# Rate limiting — previne abuso em rotas sensíveis
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=upload_zone:10m rate=1r/m;

server {
    server_name auto.normas.ifsp.edu.br;

    # Oculta versão do nginx em headers e páginas de erro
    server_tokens off;

    # Headers de segurança HTTP
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Rotas de autenticação — rate limit restritivo
    location /auth/ {
        limit_req zone=auth_zone burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rota de upload — rate limit por hora
    location /upload {
        limit_req zone=upload_zone burst=3 nodelay;
        client_max_body_size 35M;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Demais rotas
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/auto.normas.ifsp.edu.br/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/auto.normas.ifsp.edu.br/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = auto.normas.ifsp.edu.br) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name auto.normas.ifsp.edu.br;
    return 404; # managed by Certbot
}
